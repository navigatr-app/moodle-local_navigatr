name: Basic Navigatr Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, curl, json, intl, zip
        
    - name: Install Composer dependencies
      run: |
        composer install --no-dev --optimize-autoloader
        
    - name: Run PHP syntax check
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./tests/*" -exec php -l {} \;
        
    - name: Run basic PHPUnit tests (if available)
      run: |
        if [ -f "vendor/bin/phpunit" ]; then
          vendor/bin/phpunit tests/ --testdox
        else
          echo "PHPUnit not available, skipping unit tests"
        fi
        
    - name: Check for common issues
      run: |
        echo "Checking for common PHP issues..."
        
        # Check for syntax errors
        find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; | grep -v "No syntax errors"
        
        # Check for missing semicolons
        find . -name "*.php" -not -path "./vendor/*" -exec grep -l "echo.*[^;]$" {} \; || true
        
        # Check for proper PHP tags
        find . -name "*.php" -not -path "./vendor/*" -exec grep -L "<?php" {} \; || true
        
    - name: Validate plugin structure
      run: |
        echo "Validating plugin structure..."
        
        # Check required files exist
        required_files=("version.php" "lib.php" "settings.php")
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file missing"
            exit 1
          fi
        done
        
        # Check version.php has proper structure
        if grep -q "plugin->version" version.php; then
          echo "✅ version.php has proper structure"
        else
          echo "❌ version.php missing version info"
          exit 1
        fi
        
        # Check lib.php has proper structure
        if grep -q "function.*navigatr" lib.php; then
          echo "✅ lib.php has plugin functions"
        else
          echo "⚠️  lib.php may be missing plugin functions"
        fi
        
    - name: Test results
      if: always()
      run: |
        echo "✅ Basic tests completed successfully!"
        echo "📊 Plugin structure validation passed"
        echo "🔍 Syntax checks completed"
